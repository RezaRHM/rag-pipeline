global:
  scrape_interval: 15s       # هر ۱۵ ثانیه metrics بگیر
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'litellm'
    static_configs:
      - targets: ['litellm:4000']

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
